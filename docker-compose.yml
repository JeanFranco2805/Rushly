version: '3.9'

networks:
  rushly-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: rushly-postgres
    environment:
      POSTGRES_USER: rushly
      POSTGRES_PASSWORD: rushly123
      POSTGRES_DB: rushly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rushly-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rushly -d rushly"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: rushly-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: rushly
      MONGO_INITDB_ROOT_PASSWORD: rushly123
      MONGO_INITDB_DATABASE: rushly_products
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - rushly-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: rushly-eureka
    ports:
      - "8761:8761"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: rushly-config
    ports:
      - "8088:8088"
    networks:
      - rushly-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 50s

  # ─── MICROSERVICES ───────────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: rushly-user
    ports:
      - "8080:8080"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rushly
      - SPRING_DATASOURCE_USERNAME=rushly
      - SPRING_DATASOURCE_PASSWORD=rushly123
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: rushly-product
    ports:
      - "8060:8060"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://rushly:rushly123@mongodb:27017/rushly_products?authSource=admin
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      mongodb:
        condition: service_healthy
      config-server:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: rushly-cart
    ports:
      - "8050:8050"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rushly
      - SPRING_DATASOURCE_USERNAME=rushly
      - SPRING_DATASOURCE_PASSWORD=rushly123
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: rushly-order
    ports:
      - "8040:8040"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rushly
      - SPRING_DATASOURCE_USERNAME=rushly
      - SPRING_DATASOURCE_PASSWORD=rushly123
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: rushly-notification
    ports:
      - "8030:8030"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rushly
      - SPRING_DATASOURCE_USERNAME=rushly
      - SPRING_DATASOURCE_PASSWORD=rushly123
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── GATEWAY ─────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: rushly-gateway
    ports:
      - "8070:8070"
    networks:
      - rushly-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8088
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8088
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=10
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
    depends_on:
      config-server:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started

  # ─── FRONTEND ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend/Rushly-frontend
      dockerfile: Dockerfile
    container_name: rushly-frontend
    ports:
      - "3000:80"
    networks:
      - rushly-net
    depends_on:
      - api-gateway
    environment:
      - VITE_API_BASE_URL=http://localhost:8070