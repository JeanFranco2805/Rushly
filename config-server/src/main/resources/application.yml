spring:
  application:
    name: Config-server
  profiles:
    active: native

  cloud:
    config:
      server:
        git:
          uri: file:./src/main/resources/config

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    http-client:
      type: java
