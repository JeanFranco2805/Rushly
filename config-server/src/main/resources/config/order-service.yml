server:
  port: 8040
  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
      http-client:
        type: java
        connection-timeout: 5000
        read-timeout: 5000
        max-connections: 100
        max-connections-per-host: 50

spring:
  cloud:
    discovery:
      enabled: true


  datasource:
    url: jdbc:postgresql://localhost:5432/user-service
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
