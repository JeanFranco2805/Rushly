spring:
  application:
    name: "notification-service"

  cloud:
    discovery:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/notification-service
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8030

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    http-client:
      type: java