eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    http-client:
      type: java

spring:
  cloud:
    discovery:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/user-service
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8070